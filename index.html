<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>圣诞快乐 | 小夏同学</title>
    <style>
        /* 引入艺术字体 */
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

        body { 
            margin: 0; 
            overflow: hidden; 
            background: radial-gradient(circle at center, #1a3a5f 0%, #0c1e2f 100%);
            font-family: 'Arial', sans-serif; 
            height: 100vh;
            width: 100vw;
            transition: background 3s ease;
        }

        /* 画布层 */
        #canvas-container { 
            width: 100%; 
            height: 100%; 
            display: block; 
            position: absolute;
            top: 0; 
            left: 0; 
            z-index: 1;
        }

        /* UI层 */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 初始提示文字 */
        #start-hint {
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: opacity 0.8s ease;
        }
        
        .hint-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }
        
        .hint-text {
            font-size: 1.2rem;
            letter-spacing: 3px;
            font-weight: 300;
            background: linear-gradient(to right, #fff, #ffd700, #fff);
            -webkit-background-clip: text;
            color: transparent;
            animation: shine 3s infinite linear;
        }

        /* 祝福语 */
        #message-box {
            opacity: 0;
            transform: translateY(30px);
            transition: all 2.5s ease 0.5s;
            position: absolute;
            top: 35%;
        }

        h1.title {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 15px #ffcc00, 0 0 30px #ff3333;
            line-height: 1.2;
            animation: textBreath 3s ease-in-out infinite;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #ffcccc;
            margin-top: 15px;
            letter-spacing: 2px;
            line-height: 1.8;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            animation: textBreath 4s ease-in-out infinite;
        }

        /* 手动音量按钮 */
        #sound-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 20;
            pointer-events: auto;
            background: rgba(255,255,255,0.3);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px); /* 适配iOS */
        }

        /* 动画关键帧 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes shine {
            0% { background-position: -200%; }
            100% { background-position: 200%; }
        }

        @keyframes textBreath {
            0%, 100% { 
                transform: scale(1); 
                text-shadow: 0 0 15px #ffcc00, 0 0 30px #ff3333;
            }
            50% { 
                transform: scale(1.05); 
                text-shadow: 0 0 20px #ffcc00, 0 0 40px #ff3333, 0 0 5px rgba(255,255,255,0.8);
            }
        }

        /* 功能类 */
        .hidden { 
            opacity: 0 !important; 
            pointer-events: none; 
        }
        
        .visible { 
            opacity: 1 !important; 
            transform: translateY(0) !important; 
        }

        /* 点击后的暖色背景 */
        .warm-theme {
            background: radial-gradient(circle at center, #6b0f0f 0%, #290505 100%) !important;
        }
    </style>
</head>
<body>
    <!-- 音频（适配苹果微信） -->
    <audio id="bgm" loop preload="metadata">
        <!-- 主源：圣诞纯音乐（网易云国内CDN） -->
        <source src="https://music.163.com/song/media/outer/url?id=1860626084.mp3" type="audio/mpeg">
        <!-- 备用源：Jingle Bells（酷我国内CDN） -->
        <source src="https://cdn.kuwo.cn/newh5/singles/songinfoandplay/395878577.mp3?from=web" type="audio/mpeg">
    </audio>

    <!-- UI层 -->
    <div class="ui-layer">
        <div id="start-hint">
            <div class="hint-icon">🎄</div>
            <div class="hint-text">点击开启圣诞惊喜</div>
        </div>
        
        <div id="message-box">
            <h1 class="title">小夏同学 Merry Christmas</h1>
            <p class="subtitle">
                愿星光落入你怀中<br>
                平安喜乐，万事胜意
            </p>
        </div>

        <!-- 手动音量按钮 -->
        <button id="sound-btn">🔊</button>
    </div>

    <!-- 3D画布容器 -->
    <div id="canvas-container"></div>

    <!-- Three.js库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 全局变量
        let scene, camera, renderer;
        let treeSystem, starSystem, snowSystem;
        let isExploded = false;
        let clock = new THREE.Clock();

        // 初始化
        function init() {
            const container = document.getElementById('canvas-container');

            // 1. 创建场景
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0c1e2f, 0.002);

            // 2. 创建相机
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 45);

            // 3. 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // 4. 创建物体
            createTreeParticles();
            createTopStar();
            createSnow();

            // 5. 事件监听
            window.addEventListener('resize', onResize);
            document.body.addEventListener('click', onInteract);
            document.body.addEventListener('touchstart', onInteract, {passive: false});

            // 6. 手动音量按钮事件
            initSoundBtn();

            // 7. 动画循环
            animate();
        }

        // 创建发光纹理
        function createGlowTexture(r, g, b) {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, 1)`);
            gradient.addColorStop(0.4, `rgba(${r}, ${g}, ${b}, 0.5)`);
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        // 创建圣诞树粒子
        function createTreeParticles() {
            const geometry = new THREE.BufferGeometry();
            const count = 3500;
            const positions = [];
            const colors = [];
            const speeds = [];

            const colorGreen = new THREE.Color(0x55ff88);
            const colorRed = new THREE.Color(0xff3333);
            const colorGold = new THREE.Color(0xffd700);

            for (let i = 0; i < count; i++) {
                const angle = i * 0.1;
                const y = (i / count) * 35 - 18;
                const radius = (1 - (i / count)) * 14;
                
                const x = Math.cos(angle) * radius + (Math.random()-0.5) * 1.5;
                const z = Math.sin(angle) * radius + (Math.random()-0.5) * 1.5;

                positions.push(x, y, z);

                const rand = Math.random();
                if (rand > 0.9) {
                    colors.push(colorRed.r, colorRed.g, colorRed.b);
                } else if (rand > 0.8) {
                    colors.push(colorGold.r, colorGold.g, colorGold.b);
                } else {
                    colors.push(colorGreen.r, colorGreen.g, colorGreen.b);
                }

                speeds.push(
                    (Math.random() - 0.5) * 0.3,
                    Math.random() * 0.3 + 0.15,
                    (Math.random() - 0.5) * 0.3
                );
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setAttribute('aSpeed', new THREE.Float32BufferAttribute(speeds, 3));
            geometry.userData = { originalPositions: positions.slice() };

            const material = new THREE.PointsMaterial({
                size: 0.7,
                vertexColors: true,
                map: createGlowTexture(255, 255, 255),
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: 0.9
            });

            treeSystem = new THREE.Points(geometry, material);
            scene.add(treeSystem);
        }

        // 创建树顶星星
        function createTopStar() {
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute([0, 18, 0], 3));
            
            const material = new THREE.PointsMaterial({
                size: 4,
                color: 0xffff00,
                map: createGlowTexture(255, 255, 0),
                blending: THREE.AdditiveBlending,
                transparent: true,
                depthWrite: false
            });

            starSystem = new THREE.Points(geometry, material);
            scene.add(starSystem);
        }

        // 创建雪花
        function createSnow() {
            const geometry = new THREE.BufferGeometry();
            const count = 800;
            const positions = [];
            
            for(let i=0; i<count; i++){
                positions.push(
                    THREE.MathUtils.randFloatSpread(100),
                    THREE.MathUtils.randFloatSpread(100),
                    THREE.MathUtils.randFloatSpread(100)
                );
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.5,
                color: 0xffffff,
                transparent: true,
                opacity: 0.6,
                map: createGlowTexture(255, 255, 255),
                blending: THREE.AdditiveBlending
            });
            
            snowSystem = new THREE.Points(geometry, material);
            scene.add(snowSystem);
        }

        // 手动音量按钮初始化
        function initSoundBtn() {
            const soundBtn = document.getElementById('sound-btn');
            soundBtn.addEventListener('click', function() {
                const audio = document.getElementById('bgm');
                audio.volume = 0.5;
                
                if (audio.paused) {
                    // 解锁iOS音频上下文后播放
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) {
                        new AudioContext().resume().then(() => audio.play());
                    } else {
                        audio.play();
                    }
                    this.innerHTML = "🎵";
                } else {
                    audio.pause();
                    this.innerHTML = "🔊";
                }
            });
        }

        // 交互触发函数（适配苹果微信音频）
        function onInteract(e) {
            if (isExploded) return;
            if(e.type === 'touchstart') e.preventDefault();

            // 解锁iOS音频上下文
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                const audioCtx = new AudioContext();
                audioCtx.resume().then(() => {}).catch(err => console.log('解锁音频:', err));
            }

            // 播放音频（带重试逻辑）
            const audio = document.getElementById('bgm');
            audio.volume = 0.5;
            audio.pause();
            audio.currentTime = 0;
            
            const playAudio = () => {
                audio.play().then(() => {
                    console.log('音频播放成功');
                }).catch(err => {
                    console.log('播放重试:', err);
                    setTimeout(() => audio.play(), 100);
                });
            };
            playAudio();

            // UI和场景切换
            isExploded = true;
            document.getElementById('start-hint').classList.add('hidden');
            document.getElementById('message-box').classList.add('visible');
            document.body.classList.add('warm-theme');
            scene.fog.color.setHex(0x290505);
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            if (!isExploded) {
                // 圣诞树缓慢旋转
                treeSystem.rotation.y -= 0.003;
                // 圣诞树明显呼吸效果
                const scale = 1 + Math.sin(time * 1.5) * 0.05;
                treeSystem.scale.set(scale, scale, scale);
                // 星星缓慢闪烁
                starSystem.material.size = 4 + Math.sin(time * 3) * 0.8;
                starSystem.material.opacity = 0.8 + Math.sin(time * 2.0) * 0.2;
            } else {
                // 圣诞树粒子扩散
                const positions = treeSystem.geometry.attributes.position.array;
                const speeds = treeSystem.geometry.attributes.aSpeed.array;
                
                for (let i = 0; i < positions.length; i += 3) {
                    const x = positions[i];
                    const y = positions[i+1];
                    const z = positions[i+2];
                    
                    const currentRadius = Math.sqrt(x*x + z*z);
                    const angle = Math.atan2(z, x);
                    const expansion = 1.005;
                    
                    positions[i] = Math.cos(angle) * currentRadius * expansion + speeds[i] * 0.05;
                    positions[i+1] = y + speeds[i+1] * 0.1;
                    positions[i+2] = Math.sin(angle) * currentRadius * expansion + speeds[i+2] * 0.05;
                }

                treeSystem.geometry.attributes.position.needsUpdate = true;
                treeSystem.rotation.y -= 0.001;
                
                // 粒子淡出
                if (treeSystem.material.opacity > 0.1) {
                    treeSystem.material.opacity -= 0.002;
                }
                
                // 星星放大消失
                starSystem.scale.multiplyScalar(1.01);
                starSystem.material.opacity -= 0.005;
            }

            // 雪花缓慢下落
            const snowPos = snowSystem.geometry.attributes.position.array;
            for(let i=1; i<snowPos.length; i+=3) {
                snowPos[i] -= 0.07;
                if(snowPos[i] < -50) snowPos[i] = 50;
            }
            snowSystem.geometry.attributes.position.needsUpdate = true;
            snowSystem.rotation.y = time * 0.015;

            renderer.render(scene, camera);
        }

        // 窗口自适应
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 启动程序
        init();
    </script>
</body>
</html>
