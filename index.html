<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Merry Christmas</title>
    <style>
        /* 引入艺术字体，如果加载失败会回退到普通字体 */
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

        body { 
            margin: 0; 
            overflow: hidden; 
            /* 初始背景：参考你提供的文件，使用深蓝夜色渐变 */
            background: radial-gradient(circle at center, #1a3a5f 0%, #0c1e2f 100%);
            font-family: 'Arial', sans-serif; 
            height: 100vh;
            width: 100vw;
            transition: background 3s ease; /* 背景色过渡 */
        }

        /* 画布层 */
        #canvas-container { 
            width: 100%; 
            height: 100%; 
            display: block; 
            position: absolute;
            top: 0; 
            left: 0; 
            z-index: 1;
        }

        /* UI层：保证文字在Canvas之上 */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* 让点击穿透，点击屏幕就是点击Canvas */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 1. 初始提示文字 (点击后需要隐藏) */
        #start-hint {
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: opacity 0.8s ease;
        }
        
        .hint-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }
        
        .hint-text {
            font-size: 1.2rem;
            letter-spacing: 3px;
            font-weight: 300;
            background: linear-gradient(to right, #fff, #ffd700, #fff);
            -webkit-background-clip: text;
            color: transparent;
            animation: shine 3s infinite linear;
        }

        /* 2. 祝福语 (点击后显示) */
        #message-box {
            opacity: 0;
            transform: translateY(30px);
            transition: all 2.5s ease 0.5s; /* 延迟0.5秒显示，让粒子先飞一会 */
            position: absolute;
            top: 35%; /* 稍微靠上 */
        }

        h1.title {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem; /* 大字体 */
            color: #fff;
            margin: 0;
            text-shadow: 0 0 15px #ffcc00, 0 0 30px #ff3333;
            line-height: 1.2;
            /* 新增：文字呼吸动画（和圣诞树呼吸节奏呼应） */
            animation: textBreath 3s ease-in-out infinite;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #ffcccc;
            margin-top: 15px;
            letter-spacing: 2px;
            line-height: 1.8;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            /* 可选：给副标题添加轻微呼吸效果（幅度更小） */
            animation: textBreath 4s ease-in-out infinite;
        }

        /* 动画关键帧 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes shine {
            0% { background-position: -200%; }
            100% { background-position: 200%; }
        }

        /* 新增：文字呼吸动画关键帧 */
        @keyframes textBreath {
            0%, 100% { 
                transform: scale(1); 
                text-shadow: 0 0 15px #ffcc00, 0 0 30px #ff3333; /* 初始阴影 */
            }
            50% { 
                transform: scale(1.05); /* 放大5%，幅度适中不夸张 */
                text-shadow: 0 0 20px #ffcc00, 0 0 40px #ff3333, 0 0 5px rgba(255,255,255,0.8); /* 放大时阴影增强，更有层次感 */
            }
        }

        /* 功能类：用于JS控制 */
        .hidden { 
            opacity: 0 !important; 
            pointer-events: none; 
        }
        
        .visible { 
            opacity: 1 !important; 
            transform: translateY(0) !important; 
        }

        /* 点击后的暖色背景 */
        .warm-theme {
            /* 从深蓝变为温馨的圣诞红/暗棕色 */
            background: radial-gradient(circle at center, #6b0f0f 0%, #290505 100%) !important;
        }
    </style>
</head>
<body>

   <audio id="bgm" loop preload="auto">
        <source src="https://actions.google.com/sounds/v1/holidays/deck_the_halls.ogg" type="audio/ogg">
        <source src="https://raw.githubusercontent.com/muhammederdem/mini-player/master/mp3/2.mp3" type="audio/mp3">
        </audio>

    <div class="ui-layer">
        <div id="start-hint">
            <div class="hint-icon">🎄</div>
            <div class="hint-text">点击开启圣诞惊喜</div>
        </div>
        
        <div id="message-box">
            <h1 class="title">小夏同学 Merry Christmas</h1>
            <p class="subtitle">
                愿星光落入你怀中<br>
                平安喜乐，万事胜意
            </p>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 全局变量 ---
        let scene, camera, renderer;
        let treeSystem, starSystem, snowSystem;
        let isExploded = false;
        let clock = new THREE.Clock();

        // --- 初始化入口 ---
        function init() {
            const container = document.getElementById('canvas-container');

            // 1. 创建场景
            scene = new THREE.Scene();
            // 初始雾气：蓝色调，配合背景
            scene.fog = new THREE.FogExp2(0x0c1e2f, 0.002);

            // 2. 创建相机
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 45); // 稍微拉远距离

            // 3. 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // 4. 创建物体
            createTreeParticles();
            createTopStar();
            createSnow();

            // 5. 事件监听
            window.addEventListener('resize', onResize);
            // 兼容移动端和PC端的点击
            document.body.addEventListener('click', onInteract);
            document.body.addEventListener('touchstart', onInteract, {passive: false});

            // 6. 循环动画
            animate();
        }

        // --- 核心功能：创建发光纹理 (不需要外部图片) ---
        function createGlowTexture(r, g, b) {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, 1)`);
            gradient.addColorStop(0.4, `rgba(${r}, ${g}, ${b}, 0.5)`);
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        // --- 1. 圣诞树粒子系统 ---
        function createTreeParticles() {
            const geometry = new THREE.BufferGeometry();
            const count = 3500; // 粒子数量
            const positions = [];
            const colors = [];
            const speeds = []; // 存储每个粒子的独特速度

            const colorGreen = new THREE.Color(0x55ff88);
            const colorRed = new THREE.Color(0xff3333);
            const colorGold = new THREE.Color(0xffd700);

            for (let i = 0; i < count; i++) {
                // 算法：圆锥螺旋
                const angle = i * 0.1;
                // 高度从 -15 到 15
                const y = (i / count) * 35 - 18; 
                // 半径随高度变小 (底部宽，顶部窄)
                const radius = (1 - (i / count)) * 14; 
                
                // 增加一些随机性，让树看起来毛茸茸的
                const x = Math.cos(angle) * radius + (Math.random()-0.5) * 1.5;
                const z = Math.sin(angle) * radius + (Math.random()-0.5) * 1.5;

                positions.push(x, y, z);

                // 颜色分配：80%绿，10%红，10%金
                const rand = Math.random();
                if (rand > 0.9) {
                    colors.push(colorRed.r, colorRed.g, colorRed.b);
                } else if (rand > 0.8) {
                    colors.push(colorGold.r, colorGold.g, colorGold.b);
                } else {
                    colors.push(colorGreen.r, colorGreen.g, colorGreen.b);
                }

                // 预存扩散速度 (x, y, z) - 调整为更慢的速度
                speeds.push(
                    (Math.random() - 0.5) * 0.3, // X轴漂移
                    Math.random() * 0.3 + 0.15,   // Y轴向上升
                    (Math.random() - 0.5) * 0.3   // Z轴漂移
                );
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setAttribute('aSpeed', new THREE.Float32BufferAttribute(speeds, 3));

            // 保存原始位置
            geometry.userData = { 
                originalPositions: positions.slice() 
            };

            const material = new THREE.PointsMaterial({
                size: 0.7,
                vertexColors: true,
                map: createGlowTexture(255, 255, 255), // 使用白色纹理，颜色由vertexColors控制
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: 0.9
            });

            treeSystem = new THREE.Points(geometry, material);
            scene.add(treeSystem);
        }

        // --- 2. 树顶大星星 ---
        function createTopStar() {
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute([0, 18, 0], 3));
            
            const material = new THREE.PointsMaterial({
                size: 4,
                color: 0xffff00,
                map: createGlowTexture(255, 255, 0),
                blending: THREE.AdditiveBlending,
                transparent: true,
                depthWrite: false
            });

            starSystem = new THREE.Points(geometry, material);
            scene.add(starSystem);
        }

        // --- 3. 背景雪花 ---
        function createSnow() {
            const geometry = new THREE.BufferGeometry();
            const count = 800;
            const positions = [];
            
            for(let i=0; i<count; i++){
                positions.push(
                    THREE.MathUtils.randFloatSpread(100),
                    THREE.MathUtils.randFloatSpread(100),
                    THREE.MathUtils.randFloatSpread(100)
                );
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.5,
                color: 0xffffff,
                transparent: true,
                opacity: 0.6,
                map: createGlowTexture(255, 255, 255),
                blending: THREE.AdditiveBlending
            });
            
            snowSystem = new THREE.Points(geometry, material);
            scene.add(snowSystem);
        }

        // --- 交互触发函数 ---
        function onInteract(e) {
            // 防止重复触发
            if (isExploded) return;
            
            // 兼容性处理：如果是触摸事件，阻止部分默认行为
            // if(e.type === 'touchstart') e.preventDefault(); 

            // 1. 播放音乐
            const audio = document.getElementById('bgm');
            audio.volume = 0.5; // 音量调整为50%，更柔和
            audio.play().then(() => {
                console.log("圣诞音乐播放中");
            }).catch(err => {
                console.log("音乐播放失败（浏览器交互策略）:", err);
            });

            // 2. 状态改变
            isExploded = true;

            // 3. UI 变换 (关键需求)
            const startHint = document.getElementById('start-hint');
            const messageBox = document.getElementById('message-box');
            
            // 隐藏开始文字
            startHint.classList.add('hidden');
            
            // 显示祝福语
            messageBox.classList.add('visible');

            // 4. 背景变换
            document.body.classList.add('warm-theme');
            
            // 改变雾气颜色以匹配背景
            scene.fog.color.setHex(0x290505); 
        }

        // --- 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();

            if (!isExploded) {
                // --- 状态A：正常旋转 - 降低旋转速度，更优雅
                treeSystem.rotation.y -= 0.003; // 从0.005调整到0.003，旋转更慢
                
                // 呼吸效果 - 降低频率，更舒缓（和文字呼吸呼应）
                const scale = 1 + Math.sin(time * 1.5) * 0.05; // 振幅0.05，和文字动画幅度匹配
                treeSystem.scale.set(scale, scale, scale);
                
                // 星星闪烁 - 降低频率，更柔和
                starSystem.material.size = 4 + Math.sin(time * 3) * 0.8; // 从4调整到3，闪烁更慢
                starSystem.material.opacity = 0.8 + Math.sin(time * 2.0) * 0.2; // 从2.5调整到2.0

            } else {
                // --- 状态B：委婉爆发 (优雅扩散) ---
                
                const positions = treeSystem.geometry.attributes.position.array;
                const speeds = treeSystem.geometry.attributes.aSpeed.array;
                
                // 遍历每个粒子
                for (let i = 0; i < positions.length; i += 3) {
                    // 1. 获取当前坐标
                    const x = positions[i];
                    const y = positions[i+1];
                    const z = positions[i+2];

                    // 2. 优雅扩散逻辑
                    // 每一个粒子沿着原来的方向稍微向外扩（膨胀），同时向上升
                    
                    // 计算当前半径
                    const currentRadius = Math.sqrt(x*x + z*z);
                    const angle = Math.atan2(z, x);

                    // 缓慢膨胀系数
                    const expansion = 1.005;
                    
                    // 更新位置
                    positions[i] = Math.cos(angle) * currentRadius * expansion + speeds[i] * 0.05;
                    positions[i+1] = y + speeds[i+1] * 0.1;
                    positions[i+2] = Math.sin(angle) * currentRadius * expansion + speeds[i+2] * 0.05;
                }

                treeSystem.geometry.attributes.position.needsUpdate = true;
                
                // 稍微旋转，增加流动感
                treeSystem.rotation.y -= 0.001;

                // 粒子逐渐淡出
                if (treeSystem.material.opacity > 0.1) {
                    treeSystem.material.opacity -= 0.002;
                }
                
                // 星星爆发后缓慢变大并消失
                starSystem.scale.multiplyScalar(1.01);
                starSystem.material.opacity -= 0.005;
            }

            // 雪花持续下落 - 降低速度，更优雅
            const snowPos = snowSystem.geometry.attributes.position.array;
            for(let i=1; i<snowPos.length; i+=3) {
                snowPos[i] -= 0.07; // 从0.1调整到0.07，下落更慢
                if(snowPos[i] < -50) snowPos[i] = 50;
            }
            snowSystem.geometry.attributes.position.needsUpdate = true;
            
            // 降低雪花旋转速度
            snowSystem.rotation.y = time * 0.015; // 从0.02调整到0.015，旋转更慢

            renderer.render(scene, camera);
        }

        // --- 窗口自适应 ---
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 启动
        init();

    </script>
</body>
</html>
